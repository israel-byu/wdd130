<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="description"
        content="Entre em contato com a Rafting em Corredeiras. Tire dúvidas, faça perguntas sobre reservas ou envie sugestões para nossa equipe.">
    <meta name="author" content="Israel Moreira Maciel">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fale Conosco | Rafting em Corredeiras</title>

    <link rel="stylesheet" href="estilos/rafting.css">
</head>

<body>

    <header>

        <img src="imagens/logo.png" alt="Logo Rafting em Corredeiras">

        <nav>
            <a href="index.html">Página Inicial</a>
            <a href="sobre.html">Sobre Nós</a>
            <a href="passeios.html">Passeios</a>
            <a href="contato.html">Fale Conosco</a>
        </nav>

    </header>

    <main>

        <section class="contato-info">

            <h1>Entre em Contato com a Rafting em Corredeiras</h1>

            <address>
                Avenida Rio Branco, 01<br>
                Rio de Janeiro, RJ<br>
                +55 21 99999-9999<br>
                info@raftingemcorredeiras.com.br
            </address>

        </section>

        <section class="contato-grid">

            <div class="mapa">

                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3675.434477433352!2d-43.1828529250458!3d-22.897340137532787!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x997f5a3945c06b%3A0x931e31dd184aa0c7!2sAv.%20Rio%20Branco%2C%201%20-%20Centro%2C%20Rio%20de%20Janeiro%20-%20RJ%2C%2020040-003!5e0!3m2!1spt-BR!2sbr!4v1781391372062!5m2!1spt-BR!2sbr"
                    width="600" height="450" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>

            </div>

            <div class="formulario">

                <form action="#" method="post">

                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" required>

                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>

                    <fieldset>

                        <legend>Propósito da Mensagem</legend>

                        <label>
                            <input type="radio" id="consulta" name="assunto" value="consulta" checked>
                            Consulta Geral
                        </label>

                        <label>
                            <input type="radio" id="reserva" name="assunto" value="reserva">
                            Pergunta sobre Reserva
                        </label>

                        <label>
                            <input type="radio" id="sugestao" name="assunto" value="sugestao">
                            Sugestão de Site
                        </label>

                    </fieldset>

                    <label for="mensagem">Mensagem</label>

                    <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

                    <label class="newsletter">

                        <input type="checkbox" id="newsletter" name="newsletter">

                        Quero receber a newsletter mensal

                    </label>

                    <button type="submit">
                        Enviar Mensagem
                    </button>

                </form>

            </div>

        </section>

        <section class="funcionarios">

            <h2>Estamos Aqui para Servi-lo</h2>

            <div class="equipe">

                <figure>

                    <img src="imagens/funcionario1.jpg" alt="Carlos Silva - Guia Líder">

                    <figcaption>
                        Carlos Silva - Guia Líder
                    </figcaption>

                </figure>

                <figure>

                    <img src="imagens/funcionario2.jpg" alt="Ana Souza - Atendimento ao Cliente">

                    <figcaption>
                        Ana Souza - Atendimento ao Cliente
                    </figcaption>

                </figure>

                <figure>

                    <img src="imagens/funcionario3.jpg" alt="Marcos Lima - Coordenador de Reservas">

                    <figcaption>
                        Marcos Lima - Coordenador de Reservas
                    </figcaption>

                </figure>

            </div>

        </section>

    </main>

    <footer>

        <p>
            © 2026 Rafting em Corredeiras | Israel Moreira Maciel
        </p>

        <nav class="redes-sociais">

            <a href="https://facebook.com">
                <img src="imagens/facebook.svg" alt="Facebook">
            </a>

            <a href="https://instagram.com">
                <img src="imagens/instagram.svg" alt="Instagram">
            </a>

            <a href="https://linkedin.com">
                <img src="imagens/linkedin.svg" alt="LinkedIn">
            </a>

        </nav>

    </footer>

</body>

</html>
